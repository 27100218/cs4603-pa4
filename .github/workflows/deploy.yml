# Bonus A — CI/CD pipeline (.github/workflows/deploy.yml)
#
# TODO: Implement a lint -> test -> deploy workflow.
#   - lint:   ruff check on agent/ and client/
#   - test:   a smoke test that imports and compiles the graph
#   - deploy: ONLY on push to main; log the model, register a new UC version,
#             and update the serving endpoint. Use GitHub Secrets for
#             DATABRICKS_HOST / DATABRICKS_TOKEN. Add a workflow_dispatch trigger.

name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO: install uv, sync deps, run `ruff check` and the smoke test
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run ruff
        run: uv run ruff check agent/ client/

      - name: Run smoke tests
        run: uv run pytest -q

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # TODO: install deps and run `python deployment/deploy.py` with secrets
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Log, register, and deploy model
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_MODEL: ${{ secrets.DATABRICKS_MODEL }}
          VECTOR_SEARCH_ENDPOINT: ${{ secrets.VECTOR_SEARCH_ENDPOINT }}
          VECTOR_SEARCH_INDEX: ${{ secrets.VECTOR_SEARCH_INDEX }}
          EMBEDDINGS_ENDPOINT: databricks-gte-large-en
        run: uv run python deployment/deploy.py

      - name: Print deployment status
        run: echo "Deployment to yahya-document-analyst complete."
